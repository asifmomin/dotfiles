# Tmux Configuration with Tokyo Night Theme
# Minimal configuration following Omarchy philosophy

# Basic Settings
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color*:Tc"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -g status-interval 60
set -g focus-events on

# Key Bindings
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Quick config reload
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Session management
bind S command-prompt -p "New session name:" "new-session -s '%%'"
bind X choose-tree -s -f '#{?session_attached,0,1}' "kill-session -t '%%'"

# Better window/pane management
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# Tokyo Night Theme (via plugin)
set -g @tokyo-night-tmux_theme night
set -g @tokyo-night-tmux_transparent 1
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_show_path 0
set -g @tokyo-night-tmux_show_battery_widget 0
set -g @tokyo-night-tmux_show_hostname 0
set -g @tokyo-night-tmux_window_id_style none

# TPM (Tmux Plugin Manager)
# Use XDG path so plugins install under ~/.config/tmux/plugins (stowed location)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# Initialize TPM (keep at bottom)
run '~/.config/tmux/plugins/tpm/tpm'